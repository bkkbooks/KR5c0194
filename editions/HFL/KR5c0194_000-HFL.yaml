body:
  text: 廣成先生杜光庭集凡受正一法籙常以甲子庚申本命三元三會五臘八節晦朔等日是日乃天氣告生陽明消暗萬善惟新天神盡下地神盡出水神悉到太一在位搜選種民考筭功過掇死定生列名金闕道士及種民其日須清齋入靖以卯酉時焚香排辦酒果二十四分或一十六分或一十二分或八分務令嚴潔先展舒法籙於凡案之上著新淨衣服澡浴盥漱畢然後入戸上香存注一一如法不可闕也先持入戸呪次上洞案香次上本案香次上香呪次禮師存念如法次鳴法鼓二十四通次發鑪呪太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三炁正神急上關啓三天太上玄元道君臣今正爾入靖燒香以某會之日正月七日上會七月七日中會十月五日下會謹依天師具典簡閱臣身中所佩正一盟威寳籙願得八方正眞生炁降流臣某身中所啓速逹徑御太上至眞無極大道玉皇尊帝御前各三禮次各稱法位泰玄都正一平炁係天師某治某炁赤天三五歩綱元命眞人臣某謹上啓太清玄元無上三天無極大道太上道君太上老君太上丈人天帝君天帝丈人九老仙都君九炁丈人百千萬重道炁千二百官君太清玉陛下臣以凡愚獲奉玄化大道垂法正一興行叨荷師尊授傳祕籙延生飛化三五品文内正身心和寜神炁外祛災沴禳制氛邪上仙上靈魁罡寳訣籙中將吏功曹衆官各有職司保身䕶命調平六府澄靜百關使妖惡不侵災害不擾三尸墮落九蟲銷亡九祖七玄生天證道開度羣品廣濟天人佐國爲時立功及物每以三會之日言功舉遷永誓遵修不負效信伏惟三天大聖太上衆尊省覽臣誠常加恩宥臣某誠惶誠恐稽首頓首謹啓次出官謹出臣某身中上仙上靈北一太上一將軍太上十將軍上仙百五十將軍直使功曹正一功曹治病功曹各十五人出主爲臣執使主將司察東西南北正定諸炁消除百病上仙上靈左右官使者主將送東西南北辟斥三災九戹五刑六害之考都主吏兵主領左右無令前後錯互上仙上靈隂陽神決吏各十五人出爲臣和正隂陽決定生籍安神飬性使合眞仙上仙上靈隂陽治病功曹隂陽治病天醫吏各十五人出主爲臣調理隂陽察𠊱五藏神仙妙藥却病消災上仙上靈二官百五十將軍主領官將吏兵士卒圍繞臣身周帀三重無令空缺上仙上靈郎吏虎賁察姦鉤騎三官僕射吏各千二百人出主爲臣屯守所居營衞左右隨逐東西南北去身百歩兵刄外向討捕凶逆執捉姦邪並令絶滅不得縱逸常當保護臣身上仙上靈天騶甲卒各千二百人出天丁力士各百二十人出主爲臣隨遂東西南北所有呼召應聲而集上仙上靈收炁食炁吏收神食神吏收鬼食鬼吏收邪食邪吏收毒食毒吏各六十人出主爲臣收食天下毒疫鬼炁妖精邪神傷寒瘧癘毒痊瘟邪蟲獸强𦍙皆收而食之悉令蕩散上仙上靈科車赤符吏剛風騎置驛馬上章吏各十人出主爲臣收捕姦邪鬼賊不正之炁呈章奏表速令上逹次隨品出籙中吏兵謹出太上正一一將軍籙籙中功曹將軍使者吏兵玉女等爲臣助國行化剪滅凶惡使至道興弘謹岀太上正一十將軍籙籙中將軍符吏功曹官將等爲臣斬惡賞善萬願隨心謹出太上正一百五十將軍籙籙中左上仙右上靈功曹將軍騎吏使者甲卒等爲臣辟斥四方不正人鬼禍害永消謹出太上正一三將軍籙籙中將軍功曹童子玉女等爲臣修生養炁增延壽祿所向安寜謹出太上正一右上靈召百鬼籙籙中功曹護身將軍玉童玉女等爲臣收斬身中及天下魑魅魍魎無害於人謹出太上正一混沌元命赤籙籙中三天解穢玉童玉女五方龍王吏兵等爲臣消滅血食浮遊侵人之鬼一切蕩除謹出太上正一上仙召百鬼籙籙中諸部眞人直神功曹六甲神將等爲臣殺滅身上三災九戹一切無侵謹岀太上正一九州社令籙籙中諸部大將軍功曹玉童玉女直符使者等爲臣於九州十二國分野之内制伏邪精行神布炁所向之地隨逐司迎擁護臣身克登仙品謹出太上正一星綱五斗籙籙中太玄西玄壷玄禁契三師將軍吏兵等爲臣行綱布禁遏截凶邪一切精祟謹出太上正一河圖保命籙籙中眞人功曹將軍使者玉童玉女等爲臣保身護命應臣召請悉令效驗謹出太上正一解六害神符籙籙中太一君皇天上帝君太上元君解六害神消刑滅害功曹將軍等爲臣驅逐妖𦍙解除災害千精萬鬼並令攝伏謹岀太上正一九鳳破穢籙籙中天靈赤官斬邪功曹誅邪攝邪破邪伐邪擊邪截邪翦邪滅邪禽竒將軍使者玉童玉女等爲臣滌蕩不係籍之神皆令滅除謹出太上正一都章畢印籙籙中天靈官功曹將軍仙人道士玉女使者等爲臣斬滅萬邪災禍不侵於人謹出太上正一華蓋大籙籙中諸部功曹將軍吏兵玉童玉女五雲兵士等爲臣誅斬惡逆消滅姦僞謹出太上正一九天兵符籙籙中功曹將軍吏兵使者甲卒等爲臣守固所居呼召立到謹出太上正一九宮捍戹籙籙中功曹上仙上靈將軍使者天騶甲卒等爲臣助國救人應於所召謹出太上正一八卦護身籙籙中五方召鬼將軍左右僕射吏兵等爲臣尺置一兵里置一營按劒持㦸斬絶邪精謹岀太上正一三五考召籙籙中三元將軍五斗功曹五星功曹童子使者等爲臣招星落斗纓絡身形凶神惡人並令攝伏謹出太上正一龍虎斬邪籙籙中功曹將軍使者玉童玉女等爲臣抗扞精邪存念立應謹出太上正一辟邪妙籙籙中玄老將軍五蓋將軍太上將軍功曹使者等爲臣鎭壓天神地祇害於物者魍魎精魅永不害人謹出太上正一四部禁炁籙籙中赤官諸部功曹將軍吏兵玉童玉女等爲臣跳星躡斗歩紀存神應於本心勿生疾患謹出太上正一大斬河邪籙籙中五十領將軍胡越氐羌傖等老君虎賁將士施天發地揺天動地將軍五色五蓋兵馬無上玄老將軍吏兵使者玉童玉女等爲臣飛戈輪刀搜索精邪營衛居止皆令安穩謹出太上正一三五功曹籙籙中蔽身隱形藏巳兵馬等爲臣内守三宮外治三界所有天神地祇壞道邪魔悉令蕩除思念立應謹出太上正一保命長生籙籙中魁綱左右諸部功曹將軍吏兵使者等爲臣内治五藏外却衆邪使三尸殄滅百關調暢功成行滿白日昇天仰荷玄澤次出諸部將軍兵馬謹出太上正一諸部玄老五侯大將軍五十萬人出無上玄留大將軍周天大將軍蓋天大將軍建天大將軍中越大將軍中武大將軍中御大將軍中亭大將軍各十萬人出太上五蓋大將軍天營大將軍九種大將軍沖天大將軍九關大將軍北闕大將軍九珠大將軍九道大將軍正天大將軍平天大將軍越門大將軍中央高皇領神大將軍青領大將軍赤領大將軍黄領大將軍白領大將軍黒領大將軍各十萬人出各領所部並依本位營衞臣前後左右除凶滅惡無上五種兵五十五萬人出中宮五營校尉兵十萬人出城門校尉兵四十萬人出中央大兵四百萬人出九正丈人中野大兵百萬人出太上城門大兵四十萬人出天丁大兵四十萬人出前帝東營大兵四十萬人出督天大兵四十萬人出發天大兵四十萬人出北方五秦兵四十萬人出五蓋大兵各四十萬人出左右將滅亡兵各二十人出左右將横行兵各六十人出東方胡老君反甲逆鱗兵九十萬人出南方越老君火營騎吏火燭兵十萬人出西方氐老君鍊杖金精兵六十萬人出北方羌老君扁鵲烏丸兵五十萬人出中央三秦傖老君二十五萬官君兵士百二十萬人出東方青始甲乙君南方赤始丙丁君西方白始庚辛君北方黑始壬癸君中央黄始戊己天柱司命君車騎兵各千二百人出高天萬丈百鬼中王各萬二千人兵士六十萬人岀高功司馬中騎大將軍郎吏虎賁察姦鉤騎三官僕射各千二百人出天騶甲卒天丁力士收炁食炁吏收神食神吏收邪食邪吏收鬼食鬼吏收精食精吏收毒食毒吏誅符破廟吏各萬二千人出主爲臣侍衞前後所部兵士備執天威器仗誅討凶逆翦滅精邪防護臣身呼召立至謹出臣所佩上三天三五前後中部元命混沌眞人赤籙直使功曹各十五人出主爲臣執使東西南北布定正炁救療諸病益壽延年左右官使者各十五人出爲臣通逹幽冥共相整理無令前却隂陽神決吏各十五人出爲臣調和隂陽決定生籍流布生炁隂陽二官治病天醫吏各十五人出爲臣和合針藥療諸疾病謹出收邪却僞功曹使者各十五人出爲臣收邪却僞滅惡誅凶司命吏十五人出爲臣增壽益筭司録吏十五人出爲臣加爵進禄司危吏十五人出爲臣理化無亂司伐吏十五人出爲臣斬妖滅魔司直吏十五人出爲臣却枉翦濫司姦吏十五人出爲臣執制邪注司察吏十五人出爲臣請是䕶非都司吏十五人出爲臣伏逆理順上三天文昌中宮中黄九道司命君十五人出爲臣除死籍正生名固守丹田消災辟病謹出赤天三五混沌生身蔽神斗綱大將軍左將軍右將軍各九人出斗魁大將軍左將軍右將軍各九人出斗𩲃大將軍左將軍右將軍各九人出九部將軍並治臣左賢斗綱定生斗魁生肝斗𩲃生魂不得有違謹出赤天三五混沌生形蔽影斗𩵄大將軍左將軍右將軍各九人出斗䰢大將軍左將軍右將軍各九人出斗魓大將軍左將軍右將軍各九人出九部將軍並治臣右賢斗𩵄生形斗䰢生肺斗魓生魄不得有違謹出赤天三五混沌生軀蔽身斗𩳐大將軍左將軍右將軍各九人出斗魒大將軍左將軍右將軍各九人出斗擊大將軍左將軍右將軍各九人岀九部將軍並治臣心中斗𩳐生人斗魒生筋斗擊生神不得有違謹出赤天三五輔體斗繫大將軍左將軍右將軍各九人出斗伐大將軍左將軍右將軍各九人出斗殺大將軍左將軍右將軍各九人出九部將軍並治臣肝中斗擊安魂斗伐靜魄斗殺仙魂不得差互謹出赤天三五璇璣却敵大將軍左將軍右將軍各九人出斗衡破敵大將軍左將軍右將軍各九人出收繫大將軍左將軍右將軍各九人岀九部將軍各治臣肺中却敵安魂破敵靜魂收繫仙魄不得有替謹出赤天三五中黄司命大將軍左將軍右將軍各九人出定壽大將軍左將軍右將軍各九人岀定仙大將軍左將軍右將軍各九人出九部將軍並治臣脾中司命安神定壽靜神定仙百神不得有犯謹出上仙都太上神明上靈官中宮執凶郎吏虎賁力士破敵察姦鉤騎僕射力士斬邪三官都官僕射力士各二百四十人出主爲臣守護所居執捉凶逆討捕姦邪並令消滅不得遺失謹出上仙都太上神明上靈官中宮斷截都官僕射各二百四十人出主爲臣南北東西給侍驅使呼召立到謹出上仙都太上神明上靈官中宮乘魁收炁食炁吏乘斗收神食神吏乗星收鬼食鬼吏乗璇璣收精食精吏乘玉衡收邪食邪吏各百二十人出爲臣收食天下凶注鬼炁精邪妖孽之神謹出太上神明上靈官中宮乗日三五科車赤符吏乗月科車捕鬼使者各百二十萬人出爲臣誅翦凶逆討捕精邪赤符追攝並令殄滅謹出太上神明上靈官中宮剛風騎置驛馬上章吏三五除死籍定生名吏各十萬人出爲臣呈章奏表速令上御消除死籍注上玉曆生名謹出上仙都太上神明上靈官中宮中黄九道定志吏定意吏定膽吏定慧吏定聰吏定勇吏力士各十二萬人岀主令臣心神開悟通逹玄微謹出太上神明上靈官中宮六隂六陽成身吏各十二萬人出爲臣調理隂陽延年保命成身合道通神接眞謹出太上神明上靈官中宮八神金剛力士高車直事使者赤車直符使者科車檢捕使者科車交擊力士各七千二百人出爲臣討繫凶逆斬伐邪精滅禍禳災驅除鬼賊謹出天靈赤官直使功曹攝神籍神都護攝獄大吏攝邪使者及攝神直符斬邪剌姦吏各二人出仙人道士玉女各百二十人出護身七神不得離身將吏各十四人出治病功曹護身將軍各二人出兵馬曹吏各九人出扁鵲吏天醫吏各二人出出者並按威儀誅邪滅僞却死來生扶助臣身令呼吸相應臣某草茅賤質千載幸㑹伏蒙師尊賜授寳籙制心脩身以自防保過泰之恩實爲罔極臣所佩受上仙上靈等籙所部將軍功曹使者眞官君將玉童玉女士卒吏兵並乞依按所部當局行事銜命傳眞宣揚道要立功佐國行化救人訓道愚迷勸進良善若有下官故炁惡逆凶邪縣官口舌惡人謀議欲見中傷臣某者左右官使者徑上天曹言白不得容隱從嵗竟歲從月竟月從日竟日從時竟時周而復始奉行如法營衞臣身免度戹難長生久視必神安定所向含眞出入行遊諸所造詣金石爲開水火爲濟皇天所覆皇地所載日月所照山川所通百邪摧伏萬神敬諾百關流潤五藏生津眞炁降身鍊形易質功成德備白日昇天當以時言功不負效信臣忠七十二晚學淺劣加以愚暗向所簡閱將軍吏兵官將士卒等恐不合儀式不相次比千愆萬過乞垂赦宥哀濟未悟不見罪罰臣某誠惶誠恐稽首再禮畢三咽炁次叩齒三通長跪祝曰臣閱籙事訖向所出上仙上靈功曹使者將軍吏兵悉還臣身中從衆妙門而入依按次位在左還左在右還右安隱金堂玉室直使功曹主領檢押無令錯互營衞周帀纏繞表裏彌綸天地無有違越須召又到一如故事次復鑪香官使者左右龍虎君侍香諸靈官令臣靜室閱籙之所自然生金液丹碧芝英百靈衆眞交㑹在此香火鑪前所啓上逹徑御太上玉皇尊帝御前三禮次吟學仙頌次出戸呪太上正一閱籙儀
